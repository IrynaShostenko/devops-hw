apiVersion: v1
kind: Secret
metadata:
  name: django-app-secrets
type: Opaque
stringData:
  SECRET_KEY: {{ .Values.secret.SECRET_KEY | quote }}
  POSTGRES_DB: {{ .Values.secret.POSTGRES_DB | quote }}
  POSTGRES_USER: {{ .Values.secret.POSTGRES_USER | quote }}
  POSTGRES_PASSWORD: {{ .Values.secret.POSTGRES_PASSWORD | quote }}
  POSTGRES_HOST: {{ .Values.secret.POSTGRES_HOST | quote }}
  POSTGRES_PORT: {{ .Values.secret.POSTGRES_PORT | quote }}
